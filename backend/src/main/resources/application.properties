server.port=8081

spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/fbrdb?useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD
spring.datasource.initialize=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File upload limits
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# -------------------------------------------------------
# FBR Sandbox API Configuration
# To switch to production: replace _sb suffix URLs below
# -------------------------------------------------------
fbr.api.token=YOUR_FBR_API_TOKEN

# Invoice channeling (sandbox)
fbr.api.validate-url=https://gw.fbr.gov.pk/di_data/v1/di/validateinvoicedata_sb

# Reference / lookup endpoints
fbr.api.provinces-url=https://gw.fbr.gov.pk/pdi/v1/provinces
fbr.api.uom-url=https://gw.fbr.gov.pk/pdi/v1/uom
fbr.api.transaction-type-url=https://gw.fbr.gov.pk/pdi/v1/transtypecode
fbr.api.doc-type-url=https://gw.fbr.gov.pk/pdi/v1/doctypecode
fbr.api.hs-code-url=https://gw.fbr.gov.pk/pdi/v1/itemdesccode

# Buyer validation endpoints
fbr.api.buyer-atl-url=https://gw.fbr.gov.pk/dist/v1/statl
fbr.api.buyer-reg-type-url=https://gw.fbr.gov.pk/dist/v1/Get_Reg_Type
